<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tài khoản - VKU FOOD</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* --- CSS RIÊNG CHO TRANG TÀI KHOẢN --- */
    nav ul li a.active {
        background-color: white !important;
        color: #ff4d00 !important;
        border-radius: 20px;
        font-weight: bold;
    }
    nav ul li a[title="Đăng xuất"] {
        background-color: #a83d00 !important;
        border-radius: 20px;
    }

    .profile-card {
        text-align: center;
        padding: 40px;
        max-width: 600px;
        margin: 40px auto;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .profile-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin-bottom: 30px;
    }

    .avatar-wrap {
        position: relative;
        width: 130px;
        height: 130px;
    }

    .avatar {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #ff4d00;
        padding: 2px;
        background: white;
    }

    .avatar-edit {
        position: absolute;
        bottom: 5px;
        right: 5px;
        background: #333;
        color: white;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.3s;
        border: 2px solid white;
        font-size: 18px;
    }
    .avatar-edit:hover { background: #ff4d00; }
    
    .identity h2 { margin: 0; color: #333; font-size: 1.6rem; }
    .identity p { margin: 5px 0 0; color: #777; }

    #accountForm { text-align: left; }
    #accountForm label { margin-top: 15px; display: block; font-weight: 600; color: #555; }
    #accountForm input, #accountForm textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; }
    #accountForm input[disabled] { background-color: #f5f5f5; color: #888; cursor: not-allowed; }
    
    .btn-logout-secondary {
        background-color: #666; color: white; margin-top: 15px; width: 100%;
        padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .btn-logout-secondary:hover { background-color: #444; }
  </style>
</head>
<body>

  <script>
    // Kiểm tra đăng nhập
    const userJson = localStorage.getItem('user');
    if (!userJson) {
        window.location.href = 'index.html';
    }

    function handleLogout() {
        localStorage.removeItem('user');
        fetch('http://localhost/vkufood/api/logout.php').then(() => window.location.href = 'index.html').catch(() => window.location.href = 'index.html');
    }

    function getUserRole() {
        const userJson = localStorage.getItem('user');
        if (!userJson) return { loggedIn: false, role: 'guest' };
        try { return JSON.parse(userJson); } catch { return { loggedIn: false, role: 'guest' }; }
    }

    function updateNav() {
        const user = JSON.parse(localStorage.getItem('user'));
        const navUl = document.getElementById('mainNavList');
        if (!navUl) return; 

        let navLinks = `<li><a href="home.html">Trang chủ</a></li><li><a href="menu.html">Thực đơn</a></li><li><a href="about.html">Giới thiệu</a></li>`;
        if (user) {
            if (user.role === 'admin') navLinks += `<li><a href="admin.html">Quản trị</a></li>`;
            navLinks += `<li><a href="account.html" class="active" id="navAccount">Tài khoản</a></li><li><a href="#" onclick="handleLogout()" title="Đăng xuất">Đăng xuất</a></li>`;
        } else {
            navLinks += `<li><a href="index.html">Đăng nhập</a></li>`;
        }
        navUl.innerHTML = navLinks;
    }
    document.addEventListener('DOMContentLoaded', updateNav);
  </script>

  <nav>
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="logo">VKU FOOD</div>
        <button class="nav-toggle" style="display: none;">☰</button>
        <ul id="mainNavList"></ul>
    </div>
  </nav>

  <main class="container">
    <section class="profile-card card">
      <div class="profile-header">
        <div class="avatar-wrap">
            <img id="avatarPreview" class="avatar" alt="Avatar" src="css/default-avatar.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1077/1077114.png'"/>
            <label for="avatarInput" class="avatar-edit" title="Đổi ảnh đại diện">✏️</label>
            <input id="avatarInput" type="file" accept="image/*" style="display:none" />
        </div>
        <div class="identity">
          <h2 id="displayName">Đang tải...</h2>
          <p id="displayEmail">...</p>
        </div>
      </div>

      <form id="accountForm">
        <input type="hidden" id="userId">

        <label for="name">👤 Họ và tên</label>
        <input type="text" id="name" required placeholder="Nhập họ tên của bạn">

        <label for="dob">🎂 Ngày sinh</label>
        <input type="date" id="dob">

        <label for="email">📧 Email (Không thể thay đổi)</label>
        <input type="email" id="email" disabled>

        <label for="phone">📞 Số điện thoại</label>
        <input type="text" id="phone" required placeholder="Nhập số điện thoại">

        <label for="address">🏠 Địa chỉ giao hàng mặc định</label>
        <textarea id="address" rows="3" required placeholder="Nhập địa chỉ của bạn"></textarea>

        <button class="btn btn-primary" type="submit" style="width: 100%; margin-top: 25px;">Lưu thay đổi</button>
        <button class="btn-logout-secondary" type="button" onclick="handleLogout()">Đăng xuất</button>
      </form>
    </section>
  </main>
  
  <script src="js/account.js"></script>
</body>
</html>
