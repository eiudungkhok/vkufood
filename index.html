<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VKU Food - Đăng nhập</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* --- CSS QUAN TRỌNG ĐỂ CHUYỂN FORM --- */
    /* Mặc định ẩn tất cả form */
    .auth-form {
      display: none;
      animation: fadeIn 0.5s;
    }
    /* Chỉ hiện form nào có class 'active' */
    .auth-form.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .form-message {
      text-align: center; margin-bottom: 10px; font-weight: bold; min-height: 20px;
    }
  </style>
</head>
<body class="login-page">
    <div class="animated-bg">
      <div class="floating-food">
        <div class="food-icon">🍕</div><div class="food-icon">🍔</div><div class="food-icon">🍜</div>
        <div class="food-icon">🍰</div><div class="food-icon">🍹</div><div class="food-icon">🥗</div>
        <div class="food-icon">🍱</div><div class="food-icon">🍣</div>
      </div>
    </div>
    
    <div class="particles">
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div><div class="particle"></div><div class="particle"></div>
      <div class="particle"></div>
    </div>
    
    <div class="container">
      <div class="form-container">
        <div class="form-header">
          <div class="logo-container">
            <img src="css/logo.png" alt="VKU Food Logo" class="logo" onerror="this.style.display='none'">
            <div class="logo-glow"></div>
          </div>
          <h1 class="title-animation">VKU Food</h1>
          <p class="subtitle-animation">Đăng nhập để khám phá ẩm thực</p>
        </div>

        <form id="login-form" class="auth-form active">
          <div id="login-message" class="form-message"></div>
          <div class="form-group">
            <label for="login-email">📧 Email:</label>
            <div class="input-icon-group">
              <input type="email" id="login-email" placeholder="Nhập email của bạn" required />
              <span class="input-icon">✉️</span>
            </div>
          </div>
          <div class="form-group">
            <label for="login-password">🔒 Mật khẩu:</label>
            <div class="password-container">
              <div class="input-icon-group">
                <input type="password" id="login-password" placeholder="Nhập mật khẩu" required />
                <span class="input-icon">🔐</span>
              </div>
              <button type="button" class="toggle-password" onclick="togglePassword('login-password')">👁️</button>
            </div>
          </div>
          <div class="form-group">
            <button type="button" class="btn btn-primary" onclick="login()">🚀 Đăng nhập</button>
          </div>
          <div class="form-links">
            <a href="javascript:void(0)" onclick="showForgot()" class="link-animation">🔑 Quên mật khẩu?</a>
            <a href="javascript:void(0)" onclick="showRegister()" class="link-animation">➕ Tạo tài khoản mới</a>
          </div>
        </form>

        <form id="register-form" class="auth-form">
          <div id="register-message" class="form-message"></div>
          <div class="form-group">
            <label for="register-name">👤 Họ và tên:</label>
            <div class="input-icon-group">
              <input type="text" id="register-name" placeholder="Nhập họ tên đầy đủ" required />
              <span class="input-icon">👨‍💼</span>
            </div>
          </div>
          <div class="form-group">
            <label for="register-dob">📅 Ngày sinh:</label>
            <div class="input-icon-group">
              <input type="date" id="register-dob" />
              <span class="input-icon">📆</span>
            </div>
          </div>
          <div class="form-group">
            <label for="register-email">📧 Email:</label>
            <div class="input-icon-group">
              <input type="email" id="register-email" placeholder="Nhập email của bạn" required />
              <span class="input-icon">✉️</span>
            </div>
          </div>
          <div class="form-group">
            <label for="register-phone">📱 Số điện thoại:</label>
            <div class="input-icon-group">
              <input type="text" id="register-phone" placeholder="Nhập số điện thoại" />
              <span class="input-icon">📞</span>
            </div>
          </div>
          <div class="form-group">
            <label for="register-address">🏠 Địa chỉ:</label>
            <div class="input-icon-group">
              <input type="text" id="register-address" placeholder="Nhập địa chỉ" />
              <span class="input-icon">🏡</span>
            </div>
          </div>
          <div class="form-group">
            <label for="register-password">🔒 Mật khẩu:</label>
            <div class="password-container">
              <div class="input-icon-group">
                <input type="password" id="register-password" placeholder="Tạo mật khẩu mạnh" required />
                <span class="input-icon">🔐</span>
              </div>
              <button type="button" class="toggle-password" onclick="togglePassword('register-password')">👁️</button>
            </div>
          </div>
          <div class="form-group">
            <button type="button" class="btn btn-primary" onclick="register()">🎯 Đăng ký</button>
          </div>
          <div class="form-links">
            <a href="javascript:void(0)" onclick="showLogin()" class="link-animation">👈 Đã có tài khoản? Đăng nhập</a>
          </div>
        </form>

        <form id="forgot-form" class="auth-form">
          <div id="forgot-message" class="form-message"></div>
          
          <div id="email-section">
            <div class="form-group">
              <label for="recover-email">📧 Email khôi phục:</label>
              <div class="input-icon-group">
                <input type="email" id="recover-email" placeholder="Nhập email để khôi phục" required />
                <span class="input-icon">✉️</span>
              </div>
            </div>
            <div class="form-group">
              <button type="button" class="btn btn-primary" onclick="recoverPassword()">📤 Gửi mã khôi phục</button>
            </div>
          </div>

          <div id="code-section" style="display:none;">
            <div class="form-group">
              <label for="recover-code">🔢 Mã khôi phục:</label>
              <div class="input-icon-group">
                <input type="text" id="recover-code" placeholder="Nhập mã gồm 6 chữ số" maxlength="6" />
                <span class="input-icon">🔑</span>
              </div>
              <small class="code-timer">Mã sẽ hết hạn sau <span id="code-expire">05:00</span></small>
            </div>
            <div class="form-group">
              <label for="new-password">🔒 Mật khẩu mới:</label>
              <div class="password-container">
                <div class="input-icon-group">
                  <input type="password" id="new-password" placeholder="Nhập mật khẩu mới" />
                  <span class="input-icon">🔐</span>
                </div>
                <button type="button" class="toggle-password" onclick="togglePassword('new-password')">👁️</button>
              </div>
            </div>
            <div class="form-group">
              <button type="button" class="btn btn-primary" onclick="resetPassword()">✅ Đặt lại mật khẩu</button>
            </div>
          </div>

          <div class="form-links">
            <a href="javascript:void(0)" onclick="showLogin()" class="link-animation">🔙 Quay lại đăng nhập</a>
          </div>
        </form>
      </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
